<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aforismos · φίλος σοφία</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-greek">φίλος σοφία</span>
        <span class="logo-sub">amigo de la sabiduría</span>
      </a>
      <nav>
        <a href="index.html">Inicio</a>
        <a href="biblioteca.html">Biblioteca</a>
        <a href="agora.html">Ágora</a>
        <a href="aforismos.html" class="active">Aforismos</a>
        <a href="videoteca.html">Videoteca</a>
        <button class="btn-secondary theme-btn" onclick="toggleTheme()" title="Cambiar tema" id="theme-icon">☽</button>
        <a href="admin.html" class="btn admin-btn">⊕ Admin</a>
      </nav>
    </div>
    <div class="greek-border"></div>
  </header>

  <section class="hero">
    <h1 class="hero-title">Aforismos</h1>
    <p class="hero-tagline">Fragmentos, sentencias y ecos de la sabiduría</p>
  </section>

  <div class="main-wrap">
    <div class="quotes-grid" id="quotes-container">
      <div class="loading-row"><span class="spinner"></span> Recuperando fragmentos…</div>
    </div>
  </div>

  <footer>
    <div class="greek-border" style="margin-bottom:1.5rem"></div>
    <span class="f-logo">φίλος σοφία</span>
    <p>Amor a la sabiduría · Desplegado en Cloudflare Pages</p>
  </footer>

  <script>
    /* ─── THEME ───────────────────────────────────────── */
    let currentTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', currentTheme);
    updateThemeIcon();

    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', currentTheme);
      localStorage.setItem('theme', currentTheme);
      updateThemeIcon();
    }
    
    function updateThemeIcon() {
      document.getElementById('theme-icon').textContent = currentTheme === 'dark' ? '☀' : '☽';
    }

    /* ─── LOAD QUOTES ─────────────────────────────────── */
    async function loadQuotes() {
      const el = document.getElementById('quotes-container');
      try {
        const r = await fetch('/api/quotes'); 
        
        if (!r.ok) throw new Error('Network response was not ok');
        
        const data = await r.json();
        const quotes = data.quotes || [];

        if (!quotes.length) {
          el.innerHTML = '<div class="empty-state">El silencio aún domina este espacio.<br><small style="font-size:0.85rem; margin-top:0.5rem; display:block;">El administrador puede agregar aforismos desde el panel.</small></div>';
          return;
        }

        el.innerHTML = quotes.map(q => {
          // Generar el bloque de la imagen solo si el autor tiene foto
          const imageHtml = q.image_url 
            ? `<img src="${esc(q.image_url)}" alt="${esc(q.author)}" class="quote-author-img" />` 
            : '';

          return `
            <div class="quote-card">
              <p class="quote-text">"${esc(q.text)}"</p>
              <div class="quote-footer">
                ${imageHtml}
                <div class="quote-author">${esc(q.author)}</div>
              </div>
            </div>
          `;
        }).join('');

      } catch (error) {
        el.innerHTML = '<div class="empty-state">Error al cargar los aforismos. Asegúrate de que la API esté conectada.</div>';
      }
    }

    /* ─── HELPERS ──────────────────────────────────────── */
    function esc(s = '') {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Cargar al iniciar
    document.addEventListener('DOMContentLoaded', loadQuotes);
  </script>
</body>
</html>
