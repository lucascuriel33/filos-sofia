name = "filos-sofia"
compatibility_date = "2024-01-01"
pages_build_output_dir = "public"

# ── KV Namespace (comments & pdf index) ─────────────────────
# 1. Run: npx wrangler kv:namespace create "FILOS_KV"
# 2. Copy the returned id into the binding below
[[kv_namespaces]]
binding = "FILOS_KV"
id = "YOUR_KV_NAMESPACE_ID"          # ← replace after step 1

# ── R2 Bucket (PDF files & avatars) ─────────────────────────
# 1. Run: npx wrangler r2 bucket create filos-sofia-bucket
# 2. The binding name must match exactly: FILOS_BUCKET
[[r2_buckets]]
binding = "FILOS_BUCKET"
bucket_name = "filos-sofia-bucket"

# ── (Optional) Environment Variables ────────────────────────
[vars]
SITE_NAME = "φίλος σοφία"
